<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1524"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <line x1="80" y1="160" x2="80" y2="370" stroke="rgba(99,155,255,.08)" stroke-width="1"/>
  <line x1="186" y1="160" x2="186" y2="370" stroke="rgba(99,155,255,.08)" stroke-width="1"/>
  <line x1="292" y1="160" x2="292" y2="370" stroke="rgba(99,155,255,.08)" stroke-width="1"/>
  <line x1="398" y1="160" x2="398" y2="370" stroke="rgba(99,155,255,.08)" stroke-width="1"/>
  <line x1="80" y1="200" x2="432" y2="200" stroke="rgba(99,155,255,.06)" stroke-width="1"/>
  <line x1="80" y1="260" x2="432" y2="260" stroke="rgba(99,155,255,.06)" stroke-width="1"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="rgba(99,155,255,.06)" stroke-width="1"/>
  <!-- Chart area fill -->
  <path d="M80,340 L162,245 L230,275 L314,165 L398,195 L432,185 L432,370 L80,370 Z"
        fill="rgba(59,130,246,.1)"/>
  <!-- Chart line (glow version behind) -->
  <polyline points="80,340 162,245 230,275 314,165 398,195 432,185"
            stroke="#3b82f6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
            fill="none" opacity="0.35" filter="url(#glow)"/>
  <!-- Chart line (crisp front) -->
  <polyline points="80,340 162,245 230,275 314,165 398,195 432,185"
            stroke="url(#line)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>
  <!-- Dots at key points -->
  <circle cx="314" cy="165" r="12" fill="#3b82f6" opacity="0.9"/>
  <circle cx="314" cy="165" r="6" fill="#60a5fa"/>
  <!-- Baseline -->
  <line x1="72" y1="370" x2="440" y2="370" stroke="rgba(99,155,255,.35)" stroke-width="6" stroke-linecap="round"/>
</svg>