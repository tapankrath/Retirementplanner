<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/><stop offset="100%" stop-color="#051428"/>
    </linearGradient>
    <linearGradient id="ln" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a70e0"/><stop offset="100%" stop-color="#5aacff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(90,172,255,.3)" stroke-width="4"/>
  <!-- chart area fill -->
  <path d="M72,400 L158,258 L234,298 L320,164 L406,206 L440,182 L440,402 L72,402 Z"
        fill="rgba(90,172,255,.12)"/>
  <!-- glow behind line -->
  <polyline points="72,400 158,258 234,298 320,164 406,206 440,182"
            stroke="#5aacff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"
            fill="none" opacity="0.3" filter="url(#glow)"/>
  <!-- crisp line -->
  <polyline points="72,400 158,258 234,298 320,164 406,206 440,182"
            stroke="url(#ln)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- peak dot -->
  <circle cx="320" cy="164" r="20" fill="#1a70e0" opacity=".8"/>
  <circle cx="320" cy="164" r="10" fill="#5aacff"/>
  <circle cx="320" cy="164" r="5" fill="#f2f6ff"/>
  <!-- baseline -->
  <line x1="58" y1="412" x2="454" y2="412" stroke="rgba(90,172,255,.5)" stroke-width="10" stroke-linecap="round"/>
</svg>